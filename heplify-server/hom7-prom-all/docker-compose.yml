volumes:
    prometheus_data: {}
    grafana_data: {}
    loki_data: {}
    caddy_data: {}
    caddy_config: {}

networks:
  frontend:
  backend:

services:
  # ---------------------------------------------------------------------------
  # Reverse Proxy — Caddy (auto TLS via Let's Encrypt)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.9-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - HOMER_DOMAIN=${HOMER_DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend
    logging:
      options:
        max-size: "50m"

  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: prometheus
    volumes:
      - ./prometheus/:/etc/prometheus/
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    expose:
      - 9090
    networks:
      - backend
    labels:
      org.label-schema.group: "monitoring"
    logging:
      options:
        max-size: "50m"
    mem_limit: 1g

  # ---------------------------------------------------------------------------
  # Alertmanager
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    volumes:
      - ./alertmanager/:/etc/alertmanager/
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    expose:
      - 9093
    networks:
      - backend
    labels:
      org.label-schema.group: "monitoring"
    logging:
      options:
        max-size: "50m"
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Node Exporter
  # ---------------------------------------------------------------------------
  nodeexporter:
    image: prom/node-exporter:v1.8.2
    container_name: nodeexporter
    user: root
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    expose:
      - 9100
    networks:
      - backend
    labels:
      org.label-schema.group: "monitoring"
    logging:
      options:
        max-size: "50m"
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_EXPLORE_ENABLED=true
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.${HOMER_DOMAIN}
    restart: unless-stopped
    expose:
      - 3000
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/login || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - frontend
      - backend
    labels:
      org.label-schema.group: "monitoring"
    logging:
      options:
        max-size: "50m"
    mem_limit: 512m

  # ---------------------------------------------------------------------------
  # Loki
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.3.0
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./loki/loki-local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    expose:
      - 3100
    networks:
      - backend
    labels:
      org.label-schema.group: "monitoring"
    logging:
      options:
        max-size: "50m"
    mem_limit: 512m

  # ---------------------------------------------------------------------------
  # Heplify Server (HEP collector)
  # ---------------------------------------------------------------------------
  heplify-server:
    image: ghcr.io/sipcapture/heplify-server
    container_name: heplify-server
    ports:
      - "127.0.0.1:${HEP_UDP_PORT:-9060}:9060"
      - "127.0.0.1:${HEP_UDP_PORT:-9060}:9060/udp"
      - "127.0.0.1:${HEP_TCP_PORT:-9061}:9061/tcp"
    command:
      - './heplify-server'
    environment:
      - "HEPLIFYSERVER_HEPADDR=0.0.0.0:9060"
      - "HEPLIFYSERVER_HEPTCPADDR=0.0.0.0:9061"
      - "HEPLIFYSERVER_HEPTLSADDR=0.0.0.0:9061"
      - "HEPLIFYSERVER_TLSCERTFOLDER=certs"
      - "HEPLIFYSERVER_DBSHEMA=homer7"
      - "HEPLIFYSERVER_DBDRIVER=postgres"
      - "HEPLIFYSERVER_DBADDR=db:5432"
      - "HEPLIFYSERVER_DBUSER=${POSTGRES_USER}"
      - "HEPLIFYSERVER_DBPASS=${POSTGRES_PASSWORD}"
      - "HEPLIFYSERVER_DBDATATABLE=homer_data"
      - "HEPLIFYSERVER_DBCONFTABLE=homer_config"
      - "HEPLIFYSERVER_DBROTATE=true"
      - "HEPLIFYSERVER_DBDROPDAYS=${DB_DROP_DAYS:-30}"
      - "HEPLIFYSERVER_LOGLVL=info"
      - "HEPLIFYSERVER_LOGSTD=true"
      - "HEPLIFYSERVER_PROMADDR=0.0.0.0:9096"
      - "HEPLIFYSERVER_DEDUP=false"
      - "HEPLIFYSERVER_LOKIURL=http://loki:3100/api/prom/push"
      - "HEPLIFYSERVER_LOKITIMER=2"
    restart: unless-stopped
    depends_on:
      - loki
      - db
    expose:
      - 9096
    networks:
      - backend
    labels:
      org.label-schema.group: "monitoring"
    logging:
      options:
        max-size: "50m"
    mem_limit: 512m

  # ---------------------------------------------------------------------------
  # Homer Web App
  # ---------------------------------------------------------------------------
  homer-webapp:
    container_name: homer-webapp
    image: ghcr.io/sipcapture/homer-app
    environment:
      - "LOKI_HOST=loki"
      - "PROM_HOST=prometheus"
      - "DB_HOST=db"
      - "DB_USER=${POSTGRES_USER}"
      - "DB_PASS=${POSTGRES_PASSWORD}"
      - "DB_KEEPALIVE=false"
      - "HOMER_LOGLEVEL=info"
    restart: unless-stopped
    expose:
      - 80
    volumes:
      - ./bootstrap:/app/bootstrap
    networks:
      - frontend
      - backend
    logging:
      options:
        max-size: "50m"
    depends_on:
      db:
        condition: service_healthy
      grafana:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    container_name: db
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    expose:
      - 5432
    restart: unless-stopped
    volumes:
      - ./init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - backend
    logging:
      options:
        max-size: "50m"
    mem_limit: 1g
